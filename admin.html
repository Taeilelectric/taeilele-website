<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 - 태일전기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --navy:#0a1628; --accent:#f4a100; --bg:#f2f5f9; --surface:#ffffff; --border:#dde3ed; --text:#1a2840; --text2:#4a5a72; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); }

  /* 로그인 */
  #login-screen {
    position:fixed; inset:0; background:linear-gradient(135deg,#0a1628 0%,#1a3a6e 100%);
    display:flex; align-items:center; justify-content:center; z-index:9999;
  }
  .login-box {
    background:#fff; border-radius:16px; padding:48px 40px; width:380px;
    box-shadow:0 24px 64px rgba(0,0,0,0.3);
  }
  .login-logo { font-size:13px; font-weight:700; letter-spacing:3px; color:var(--accent); margin-bottom:8px; }
  .login-title { font-size:24px; font-weight:900; color:var(--navy); margin-bottom:32px; }
  .login-input {
    width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--text);
    margin-bottom:12px; outline:none; transition:border-color 0.2s;
  }
  .login-input:focus { border-color:var(--accent); }
  .login-btn {
    width:100%; padding:16px; background:var(--accent); color:var(--navy);
    border:none; border-radius:8px; font-family:'Noto Sans KR',sans-serif;
    font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; transition:opacity 0.2s;
  }
  .login-btn:hover { opacity:0.85; }
  .login-err { color:#e63946; font-size:13px; margin-top:8px; display:none; }

  /* 관리자 메인 */
  #admin-screen { display:none; min-height:100vh; }
  .admin-header {
    background:var(--navy); color:#fff; padding:0 40px; height:70px;
    display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;
  }
  .admin-header-title { font-size:18px; font-weight:700; letter-spacing:1px; }
  .admin-header-title span { color:var(--accent); }
  .logout-btn {
    background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2);
    padding:8px 20px; border-radius:6px; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
    font-size:13px; font-weight:600; transition:background 0.2s;
  }
  .logout-btn:hover { background:rgba(255,255,255,0.2); }

  .admin-body { display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 70px); }

  /* 사이드바 */
  .admin-sidebar { background:#fff; border-right:1px solid var(--border); padding:32px 0; }
  .sidebar-section { margin-bottom:8px; }
  .sidebar-label { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--text2); padding:0 24px 8px; }
  .sidebar-item {
    display:block; padding:12px 24px; font-size:14px; font-weight:500; color:var(--text2);
    cursor:pointer; border-left:3px solid transparent; transition:all 0.2s; text-decoration:none;
  }
  .sidebar-item:hover { background:#f8fafd; color:var(--navy); }
  .sidebar-item.active { background:#fff8ec; color:var(--accent); border-left-color:var(--accent); font-weight:700; }

  /* 콘텐츠 영역 */
  .admin-content { padding:40px; }
  .content-panel { display:none; }
  .content-panel.active { display:block; }

  .panel-header { margin-bottom:32px; }
  .panel-title { font-size:22px; font-weight:900; color:var(--navy); margin-bottom:6px; }
  .panel-desc { font-size:13px; color:var(--text2); }

  /* 글쓰기 폼 */
  .write-form { background:#fff; border:1.5px solid var(--border); border-radius:12px; padding:32px; margin-bottom:32px; }
  .write-form-title { font-size:15px; font-weight:700; color:var(--navy); margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .form-row { margin-bottom:16px; }
  .form-label { font-size:12px; font-weight:700; color:var(--text2); letter-spacing:0.5px; margin-bottom:6px; display:block; }
  .form-input {
    width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--text); outline:none;
    transition:border-color 0.2s;
  }
  .form-input:focus { border-color:var(--accent); }
  .form-select {
    width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--text); outline:none;
    background:#fff; cursor:pointer;
  }
  .form-textarea {
    width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--text); outline:none;
    transition:border-color 0.2s; resize:vertical; min-height:120px;
  }
  .form-textarea:focus { border-color:var(--accent); }
  .form-btn {
    background:var(--accent); color:var(--navy); border:none; padding:12px 28px;
    border-radius:8px; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700;
    cursor:pointer; transition:opacity 0.2s;
  }
  .form-btn:hover { opacity:0.85; }
  .form-btn.secondary {
    background:#f0f0f0; color:var(--text2); margin-left:8px;
  }

  /* 게시글 목록 */
  .board-table { background:#fff; border:1.5px solid var(--border); border-radius:12px; overflow:hidden; }
  .board-head { display:grid; padding:14px 20px; background:#f8fafd; border-bottom:1px solid var(--border); font-size:12px; font-weight:700; color:var(--text2); letter-spacing:0.5px; }
  .board-head.notice-grid { grid-template-columns:60px 1fr 120px 100px; }
  .board-head.recruit-grid { grid-template-columns:60px 1fr 100px 100px 100px; }
  .board-row-item { display:grid; padding:14px 20px; border-bottom:1px solid #f0f0f0; font-size:14px; align-items:center; }
  .board-row-item.notice-grid { grid-template-columns:60px 1fr 120px 100px; }
  .board-row-item.recruit-grid { grid-template-columns:60px 1fr 100px 100px 100px; }
  .board-row-item:last-child { border-bottom:none; }
  .board-row-item:hover { background:#fafafa; }
  .del-btn {
    background:#fee2e2; color:#e63946; border:none; padding:5px 12px; border-radius:6px;
    font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
  .del-btn:hover { background:#fecaca; }
  .badge-on { background:rgba(244,161,0,0.15); color:var(--accent); padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }
  .badge-off { background:#f0f0f0; color:#999; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }
  .empty-msg { text-align:center; padding:48px; color:var(--text2); font-size:14px; }

  /* 토스트 알림 */
  #toast {
    position:fixed; bottom:32px; right:32px; background:var(--navy); color:#fff;
    padding:14px 24px; border-radius:10px; font-size:14px; font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,0.2); transform:translateY(80px); opacity:0;
    transition:all 0.3s; z-index:9999; pointer-events:none;
  }
  #toast.show { transform:translateY(0); opacity:1; }

  .notice-preview { background:#fff8ec; border:1px solid rgba(244,161,0,0.3); border-radius:8px; padding:12px 16px; margin-top:12px; font-size:13px; color:var(--text2); }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">TAEIL ELECTRIC</div>
    <div class="login-title">관리자 로그인</div>
    <input class="login-input" id="pw-input" type="password" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 관리자 메인 -->
<div id="admin-screen">
  <div class="admin-header">
    <div class="admin-header-title">태일전기 <span>관리자</span></div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="admin-body">
    <!-- 사이드바 -->
    <div class="admin-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">게시판 관리</div>
        <div class="sidebar-item active" onclick="showPanel('notice')">📢 공지사항</div>
        <div class="sidebar-item" onclick="showPanel('recruit')">💼 채용공고</div>
      </div>
      <div class="sidebar-section" style="margin-top:16px;">
        <div class="sidebar-label">바로가기</div>
        <a class="sidebar-item" href="index.html" target="_blank">🏠 홈페이지 보기</a>
        <a class="sidebar-item" href="contact.html" target="_blank">📋 고객센터 보기</a>
      </div>
    </div>

    <!-- 콘텐츠 -->
    <div class="admin-content">

      <!-- 공지사항 패널 -->
      <div class="content-panel active" id="panel-notice">
        <div class="panel-header">
          <div class="panel-title">공지사항 관리</div>
          <div class="panel-desc">작성한 공지사항은 홈페이지 고객센터 > 공지사항에 자동으로 반영됩니다.</div>
        </div>

        <div class="write-form">
          <div class="write-form-title">✏️ 새 공지사항 작성</div>
          <div class="form-row">
            <label class="form-label">제목</label>
            <input class="form-input" id="notice-title" type="text" placeholder="공지사항 제목을 입력하세요">
          </div>
          <div class="form-row">
            <label class="form-label">내용</label>
            <textarea class="form-textarea" id="notice-content" placeholder="공지사항 내용을 입력하세요"></textarea>
          </div>
          <button class="form-btn" onclick="addNotice()">등록하기</button>
        </div>

        <div class="board-table">
          <div class="board-head notice-grid">
            <span>번호</span><span>제목</span><span>날짜</span><span>관리</span>
          </div>
          <div id="notice-list"></div>
        </div>
      </div>

      <!-- 채용공고 패널 -->
      <div class="content-panel" id="panel-recruit">
        <div class="panel-header">
          <div class="panel-title">채용공고 관리</div>
          <div class="panel-desc">작성한 채용공고는 홈페이지 고객센터 > 채용공고에 자동으로 반영됩니다.</div>
        </div>

        <div class="write-form">
          <div class="write-form-title">✏️ 새 채용공고 작성</div>
          <div class="form-row">
            <label class="form-label">직무명</label>
            <input class="form-input" id="recruit-title" type="text" placeholder="예) 전기 설계 엔지니어 (경력)">
          </div>
          <div class="form-row">
            <label class="form-label">내용</label>
            <textarea class="form-textarea" id="recruit-content" placeholder="채용 내용, 자격요건 등을 입력하세요"></textarea>
          </div>
          <div class="form-row">
            <label class="form-label">채용 상태</label>
            <select class="form-select" id="recruit-status">
              <option value="on">채용중</option>
              <option value="off">마감</option>
            </select>
          </div>
          <button class="form-btn" onclick="addRecruit()">등록하기</button>
        </div>

        <div class="board-table">
          <div class="board-head recruit-grid">
            <span>번호</span><span>직무명</span><span>상태</span><span>날짜</span><span>관리</span>
          </div>
          <div id="recruit-list"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 비밀번호 (변경 원하시면 여기 수정) ──
var ADMIN_PW = 'taeilelec1!';

function doLogin() {
  var pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    renderNotices();
    renderRecruits();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-err').style.display = 'none';
}

function showPanel(name) {
  document.querySelectorAll('.content-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.sidebar-item').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── 날짜 포맷 ──
function today() {
  var d = new Date();
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}

// ── 토스트 ──
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ────────────────────────────
// 공지사항
// ────────────────────────────
function getNotices() {
  try { return JSON.parse(localStorage.getItem('taeil_notices') || '[]'); } catch(e){ return []; }
}
function saveNotices(data) {
  localStorage.setItem('taeil_notices', JSON.stringify(data));
}

function addNotice() {
  var title = document.getElementById('notice-title').value.trim();
  var content = document.getElementById('notice-content').value.trim();
  if (!title) { toast('제목을 입력해주세요.'); return; }
  var notices = getNotices();
  var id = Date.now();
  notices.unshift({ id:id, title:title, content:content, date:today() });
  saveNotices(notices);
  document.getElementById('notice-title').value = '';
  document.getElementById('notice-content').value = '';
  renderNotices();
  toast('공지사항이 등록되었습니다! ✅');
}

function deleteNotice(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  var notices = getNotices().filter(function(n){ return n.id !== id; });
  saveNotices(notices);
  renderNotices();
  toast('삭제되었습니다.');
}

function renderNotices() {
  var notices = getNotices();
  var list = document.getElementById('notice-list');
  if (notices.length === 0) {
    list.innerHTML = '<div class="empty-msg">등록된 공지사항이 없습니다.</div>';
    return;
  }
  list.innerHTML = notices.map(function(n, i) {
    return '<div class="board-row-item notice-grid">' +
      '<span>' + (notices.length - i) + '</span>' +
      '<span style="font-weight:500;">' + n.title + '</span>' +
      '<span style="color:var(--text2);font-size:13px;">' + n.date + '</span>' +
      '<span><button class="del-btn" onclick="deleteNotice(' + n.id + ')">삭제</button></span>' +
      '</div>';
  }).join('');
}

// ────────────────────────────
// 채용공고
// ────────────────────────────
function getRecruits() {
  try { return JSON.parse(localStorage.getItem('taeil_recruits') || '[]'); } catch(e){ return []; }
}
function saveRecruits(data) {
  localStorage.setItem('taeil_recruits', JSON.stringify(data));
}

function addRecruit() {
  var title = document.getElementById('recruit-title').value.trim();
  var content = document.getElementById('recruit-content').value.trim();
  var status = document.getElementById('recruit-status').value;
  if (!title) { toast('직무명을 입력해주세요.'); return; }
  var recruits = getRecruits();
  var id = Date.now();
  recruits.unshift({ id:id, title:title, content:content, status:status, date:today() });
  saveRecruits(recruits);
  document.getElementById('recruit-title').value = '';
  document.getElementById('recruit-content').value = '';
  document.getElementById('recruit-status').value = 'on';
  renderRecruits();
  toast('채용공고가 등록되었습니다! ✅');
}

function deleteRecruit(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  var recruits = getRecruits().filter(function(r){ return r.id !== id; });
  saveRecruits(recruits);
  renderRecruits();
  toast('삭제되었습니다.');
}

function toggleStatus(id) {
  var recruits = getRecruits().map(function(r){
    if (r.id === id) r.status = r.status === 'on' ? 'off' : 'on';
    return r;
  });
  saveRecruits(recruits);
  renderRecruits();
  toast('상태가 변경되었습니다.');
}

function renderRecruits() {
  var recruits = getRecruits();
  var list = document.getElementById('recruit-list');
  if (recruits.length === 0) {
    list.innerHTML = '<div class="empty-msg">등록된 채용공고가 없습니다.</div>';
    return;
  }
  list.innerHTML = recruits.map(function(r, i) {
    var badge = r.status === 'on'
      ? '<span class="badge-on">채용중</span>'
      : '<span class="badge-off">마감</span>';
    return '<div class="board-row-item recruit-grid">' +
      '<span>' + (recruits.length - i) + '</span>' +
      '<span style="font-weight:500;">' + r.title + '</span>' +
      '<span>' + badge + '</span>' +
      '<span style="color:var(--text2);font-size:13px;">' + r.date + '</span>' +
      '<span style="display:flex;gap:6px;">' +
        '<button class="del-btn" style="background:#e0f0ff;color:#0d47a1;" onclick="toggleStatus(' + r.id + ')">상태변경</button>' +
        '<button class="del-btn" onclick="deleteRecruit(' + r.id + ')">삭제</button>' +
      '</span>' +
      '</div>';
  }).join('');
}
</script>
</body>
</html>
